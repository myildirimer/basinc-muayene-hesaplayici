<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Muayene Formu</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 950px;
    margin: auto;
}

.card {
    background: white;
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

h1 {
    text-align: center;
    color: white;
}

h2 {
    border-left: 5px solid #2a5298;
    padding-left: 10px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th, td {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: center;
}

th { background: #f0f0f0; }

.good { color: green; font-weight: bold; }
.bad { color: red; font-weight: bold; }

button {
    padding: 8px 15px;
    background: #2a5298;
    color: white;
    border: none;
    border-radius: 5px;
}

</style>
</head>

<body>

<div class="container">

<h1>Lastik Basıncı Ölçer Muayenesi Kontrol Formu</h1>

<div class="card">
<h2>Genel Bilgi</h2>
Doküman No:
<input type="text" id="docNo">
</div>

<!-- GÖRSEL KONTROL -->
<div class="card">
<h2>1. Görsel Kontrol</h2>

<label><input type="checkbox" id="gc1"> Cihaz fiziksel olarak sağlam</label><br>
<label><input type="checkbox" id="gc2"> Ekran / gösterge okunaklı</label><br>
<label><input type="checkbox" id="gc3"> Etiket ve işaretlemeler uygun</label><br>
<label><input type="checkbox" id="gc4"> Sızdırmazlık / bağlantılar uygun</label><br>

</div>

<!-- METROLOJİK -->
<div class="card">
<h2>2. Metrolojik Kontrol</h2>

Birim:
<select id="birim">
<option value="psi">psi</option>
<option value="kPa">kPa</option>
<option value="bar">bar</option>
</select>

Min: <input type="number" id="min">
Max: <input type="number" id="max">

<button onclick="noktaOner()">Nokta Öner</button>

<div id="oneriler"></div>

<br>
Sıcaklık:
<input type="number" id="sicaklik">

<div id="olcumler"></div>

</div>

<!-- SONUÇ -->
<div class="card">
<h2>3. Sonuç</h2>

<button onclick="hesapla()">Hesapla</button>

<div id="sonuc"></div>

</div>

</div>

<script>

// yardımcı
function f2(x){ return Number(x).toFixed(2); }

// dönüşüm
function toKpa(v,u){ if(u=="psi")return v*6.89476; if(u=="bar")return v*100; return v;}
function fromKpa(v,u){ if(u=="psi")return v/6.89476; if(u=="bar")return v/100; return v;}

// tablo
function tablo(k,t){
    let s = k<=400?8:(k<=1000?16:25);
    if(t<15) return 0.5*(15-t)+s;
    if(t<=25) return s;
    return 0.5*(t-25)+s;
}

function mih(k,t){
    let m=tablo(k,t)*1.25;
    return m<13.8?13.8:m;
}

// nokta öner
function noktaOner(){

    let min=parseFloat(minEl.value);
    let max=parseFloat(maxEl.value);
    let b=birim.value;

    let minPsi=fromKpa(toKpa(min,b),"psi");
    let maxPsi=fromKpa(toKpa(max,b),"psi");

    let r=maxPsi-minPsi;

    let alt=Math.round((minPsi+r*0.2)/5)*5;
    let orta=Math.round((minPsi+r*0.5)/5)*5;
    let ust=Math.round((minPsi+r*0.8)/5)*5;

    document.getElementById("oneriler").innerHTML=
    `Alt: ${alt} | Orta: ${orta} | Üst: ${ust} psi`;

    let vals=[alt,orta,ust].map(v=>fromKpa(toKpa(v,"psi"),b));

    let html="";
    for(let i=1;i<=3;i++){
        html+=`Pc: <input id="vc${i}" value="${f2(vals[i-1])}">
        Pref: <input id="vr${i}"><br>`;
    }
    olcumler.innerHTML=html;
}

// hesap
function hesapla(){

    // görsel kontrol şart
    let gc = [gc1, gc2, gc3, gc4].every(x=>x.checked);

    if(!gc){
        alert("Görsel kontrol sağlanmadan muayene tamamlanamaz!");
        return;
    }

    let b=birim.value;
    let t=parseFloat(sicaklik.value);
    let doc=docNo.value;

    let genel="UYGUN";
    let rows="";

    for(let i=1;i<=3;i++){

        let vc=parseFloat(document.getElementById("vc"+i).value);
        let vr=parseFloat(document.getElementById("vr"+i).value);

        let E=toKpa(vc,b)-toKpa(vr,b);
        let absE=Math.abs(E);

        let m=mih(toKpa(vr,b),t);
        let m_b=fromKpa(m,b);

        let s=(absE<=m)?"U":"UD";
        if(s=="UD") genel="UYGUN DEĞİL";

        rows+=`
        <tr>
        <td>${i}</td>
        <td>${f2(vc)}</td>
        <td>${f2(vr)}</td>
        <td>${f2(E)}</td>
        <td>${f2(m_b)}</td>
        <td class="${s=="U"?"good":"bad"}">${s}</td>
        </tr>`;
    }

    sonuc.innerHTML=`
    Doküman No: ${doc}
    <table>
    <tr>
    <th>Nokta</th>
    <th>Pc (${b})</th>
    <th>Pref (${b})</th>
    <th>E (${b})</th>
    <th>MİH (${b})</th>
    <th>Sonuç</th>
    </tr>
    ${rows}
    </table>
    <h2 class="${genel=="UYGUN"?"good":"bad"}">${genel}</h2>`;
}

</script>

</body>
</html>
