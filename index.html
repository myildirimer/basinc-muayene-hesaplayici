<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Muayene Sistemi</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
    text-align: center;
}

.container {
    margin-top: 120px;
}

.card {
    background: white;
    color: black;
    padding: 30px;
    margin: 20px;
    display: inline-block;
    border-radius: 12px;
    cursor: pointer;
    width: 260px;
    font-size: 18px;
    box-shadow: 0 5px 12px rgba(0,0,0,0.3);
}

.card:hover {
    background: #ddd;
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="container">

<h1>MUAYENE KONTROL SİSTEMİ</h1>

<div class="card" onclick="git('basinc.html')">
Basınç Ölçer Muayenesi
</div>

<div class="card" onclick="git('hacim.html')">
Hacim Ölçek Muayenesi
</div>

</div>

<script>
function git(sayfa){
    window.location.href = sayfa;
}
</script>

</body>
</html>
