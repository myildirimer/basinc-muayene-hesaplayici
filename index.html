<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Basınç Ölçer Muayene</title>
<style>
body { font-family: Arial; margin: 40px; }
input, select { margin: 5px; padding: 5px; }
.section { margin-bottom: 30px; }
.result { border: 1px solid #ccc; padding: 10px; margin-top: 10px; }
</style>
</head>
<body>

<h1>Lastik Basıncı Ölçer Muayene Programı</h1>

<div class="section">
<h2>1. Aşama: Cihaz Bilgileri</h2>

<label>Birim:</label>
<select id="birim">
<option value="psi">psi</option>
<option value="kPa">kPa</option>
<option value="bar">bar</option>
</select><br>

<label>Min:</label>
<input type="number" id="min"><br>

<label>Max:</label>
<input type="number" id="max"><br>

<button onclick="noktaOner()">Nokta Öner</button>

<p id="oneriler"></p>
</div>

<div class="section">
<h2>2. Aşama: Ölçümler</h2>

<div id="olcumler">
</div>
</div>

<div class="section">
<h2>3. Sonuç</h2>
<button onclick="hesapla()">Hesapla</button>
<div id="sonuclar"></div>
</div>

<script>

// --- DÖNÜŞÜMLER ---
function toKpa(val, unit){
    if(unit === "psi") return val * 6.89476;
    if(unit === "bar") return val * 100;
    return val;
}

function fromKpa(val, unit){
    if(unit === "psi") return val / 6.89476;
    if(unit === "bar") return val / 100;
    return val;
}

// --- TABLO ---
function tablo(kpa, t){
    let sabit;
    if(kpa <= 400) sabit = 8;
    else if(kpa <= 1000) sabit = 16;
    else sabit = 25;

    if(t < 15) return 0.5 * (15 - t) + sabit;
    if(t <= 25) return sabit;
    return 0.5 * (t - 25) + sabit;
}

function mih(kpa, t){
    let m = tablo(kpa, t) * 1.25;
    if(m < 13.8) m = 13.8;
    return m;
}

// --- NOKTA ÖNER ---
function noktaOner(){
    let min = parseFloat(document.getElementById("min").value);
    let max = parseFloat(document.getElementById("max").value);
    let birim = document.getElementById("birim").value;

    let minPsi = fromKpa(toKpa(min, birim), "psi");
    let maxPsi = fromKpa(toKpa(max, birim), "psi");

    let arr = [];
    for(let i = minPsi; i <= maxPsi; i += 15){
        arr.push(i);
    }

    let alt = arr[0];
    let orta = arr[Math.floor(arr.length/2)];
    let ust = arr[arr.length-1];

    alt = fromKpa(toKpa(alt,"psi"), birim);
    orta = fromKpa(toKpa(orta,"psi"), birim);
    ust = fromKpa(toKpa(ust,"psi"), birim);

    document.getElementById("oneriler").innerText =
        `Önerilen: ${alt} , ${orta} , ${ust} (${birim})`;

    // ölçüm inputlarını oluştur
    let html = "";
    for(let i=1;i<=3;i++){
        html += `
        <h4>Nokta ${i}</h4>
        Vc: <input id="vc${i}" type="number">
        Vref: <input id="vr${i}" type="number">
        Sıcaklık: <input id="t${i}" type="number"><br>
        `;
    }
    document.getElementById("olcumler").innerHTML = html;
}

// --- HESAP ---
function hesapla(){
    let birim = document.getElementById("birim").value;
    let genel = "UYGUN";

    let out = "";

    for(let i=1;i<=3;i++){
        let vc = parseFloat(document.getElementById("vc"+i).value);
        let vr = parseFloat(document.getElementById("vr"+i).value);
        let t = parseFloat(document.getElementById("t"+i).value);

        let vc_kpa = toKpa(vc, birim);
        let vr_kpa = toKpa(vr, birim);

        let E = vc_kpa - vr_kpa;
        let absE = Math.abs(E);

        let m = mih(vr_kpa, t);
        let m_birim = fromKpa(m, birim);

        let sonuc = (absE <= m) ? "U" : "UD";

        if(sonuc === "UD") genel = "UYGUN DEĞİL";

        out += `
        <div class="result">
        <b>Nokta ${i}</b><br>
        E: ${E}<br>
        |E|: ${absE}<br>
        MİH: ${m_birim}<br>
        Sonuç: ${sonuc}
        </div>
        `;
    }

    out += `<h3>GENEL SONUÇ: ${genel}</h3>`;

    document.getElementById("sonuclar").innerHTML = out;
}

</script>

</body>
</html>
